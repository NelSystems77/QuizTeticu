<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#FF6B35" />
<title>¡A practicar Español! 🎒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,800;1,9..144,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8EC;
    --ink:#1F1A3A;
    --accent:#FF6B35;
    --accent-2:#FFB830;
    --good:#2BB673;
    --bad:#E74C3C;
    --blue:#4A90E2;
    --purple:#8E4BD1;
    --card:#FFFFFF;
    --shadow: 6px 6px 0 var(--ink);
    --shadow-sm: 3px 3px 0 var(--ink);
    --radius: 18px;
    --radius-sm: 12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior:none}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,184,48,.25) 0 18px, transparent 19px),
      radial-gradient(circle at 88% 22%, rgba(74,144,226,.22) 0 14px, transparent 15px),
      radial-gradient(circle at 15% 92%, rgba(142,75,209,.22) 0 16px, transparent 17px),
      radial-gradient(circle at 85% 78%, rgba(43,182,115,.22) 0 12px, transparent 13px);
    background-attachment:fixed;
    padding:14px 14px 120px;
  }
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:800;line-height:1.1;letter-spacing:-.5px}

/* ====== HEADER ====== */
.topbar{
position:sticky;top:10px;z-index:40;
background:var(–ink);color:var(–bg);
border-radius:var(–radius);
padding:12px 14px;
box-shadow:var(–shadow);
display:flex;align-items:center;gap:12px;
margin-bottom:16px;
}
.topbar .emoji{font-size:28px}
.topbar .title{font-family:‘Fraunces’,serif;font-size:18px;font-weight:800}
.topbar .score{margin-left:auto;background:var(–accent-2);color:var(–ink);
padding:6px 12px;border-radius:999px;font-weight:800;font-size:14px;
border:2px solid var(–ink);box-shadow:2px 2px 0 var(–bg)}

/* ====== HERO ====== */
.hero{
background:var(–accent);
color:white;
border:3px solid var(–ink);
border-radius:var(–radius);
padding:22px 18px;
box-shadow:var(–shadow);
position:relative;overflow:hidden;
margin-bottom:18px;
}
.hero::before{
content:’’;position:absolute;inset:auto -30px -40px auto;
width:180px;height:180px;border-radius:50%;background:var(–accent-2);
opacity:.45;
}
.hero h1{font-size:32px;margin-bottom:8px;position:relative}
.hero p{font-weight:600;position:relative;font-size:15px}
.hero .pill{display:inline-block;background:white;color:var(–ink);
padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;
margin-top:10px;border:2px solid var(–ink)}

/* ====== MENÚ DE TEMAS ====== */
.menu{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.tile{
background:var(–card);
border:3px solid var(–ink);
border-radius:var(–radius);
padding:14px 12px;
box-shadow:var(–shadow-sm);
cursor:pointer;
transition:transform .12s ease, box-shadow .12s ease;
text-align:left;
font-family:inherit;color:inherit;
}
.tile:active{transform:translate(3px,3px);box-shadow:0 0 0 var(–ink)}
.tile .icon{font-size:30px;display:block;margin-bottom:6px}
.tile h3{font-size:15px;margin-bottom:3px}
.tile small{font-size:11px;color:#666;font-weight:700}
.tile.done{background:#D7F5E5}
.tile.done::after{content:‘✓’;position:absolute;top:6px;right:10px;color:var(–good);font-weight:800;font-size:20px}
.tile{position:relative}

.tile.t1{background:#FFE8D6}
.tile.t2{background:#E8F4FF}
.tile.t3{background:#F4E8FF}
.tile.t4{background:#FFF4D6}
.tile.t5{background:#E8FFF0}
.tile.t6{background:#FFE8F0}

.quiz-btn{
grid-column:1/-1;
background:var(–ink);color:var(–bg);
text-align:center;padding:18px;
font-family:‘Fraunces’,serif;font-weight:800;font-size:20px;
border:3px solid var(–ink);border-radius:var(–radius);
box-shadow:var(–shadow);cursor:pointer;
}
.quiz-btn:active{transform:translate(3px,3px);box-shadow:var(–shadow-sm)}
.quiz-btn .sub{display:block;font-family:‘Nunito’;font-size:13px;font-weight:700;opacity:.8;margin-top:4px}

/* ====== VISTA DE TEMA ====== */
.view{display:none}
.view.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.back{
background:var(–ink);color:var(–bg);
border:none;padding:8px 14px;border-radius:999px;
font-family:inherit;font-weight:700;font-size:13px;
margin-bottom:14px;cursor:pointer;
display:inline-flex;align-items:center;gap:6px;
}

.topic-head{
background:var(–card);
border:3px solid var(–ink);
border-radius:var(–radius);
padding:16px;margin-bottom:14px;
box-shadow:var(–shadow-sm);
}
.topic-head h2{font-size:24px;margin-bottom:6px}
.topic-head p{font-size:14px;color:#444;font-weight:600}
.progress-wrap{background:#eee;height:10px;border-radius:999px;margin-top:12px;border:2px solid var(–ink);overflow:hidden}
.progress-fill{height:100%;background:var(–good);width:0;transition:width .3s ease}

/* Teoría */
.theory{
background:#FFF4D6;
border:3px solid var(–ink);
border-radius:var(–radius);
padding:14px;margin-bottom:14px;
box-shadow:var(–shadow-sm);
}
.theory h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.theory p{font-size:14px;margin-bottom:6px}
.theory ul{padding-left:20px;margin:6px 0}
.theory li{font-size:13.5px;margin-bottom:4px}
.theory .example{background:white;border:2px dashed var(–ink);padding:8px 10px;border-radius:var(–radius-sm);margin-top:8px;font-size:13px}
.theory strong{color:var(–accent)}

/* Ejercicios */
.exercise{
background:var(–card);
border:3px solid var(–ink);
border-radius:var(–radius);
padding:16px;margin-bottom:14px;
box-shadow:var(–shadow-sm);
}
.ex-num{display:inline-block;background:var(–accent);color:white;
padding:2px 10px;border-radius:999px;font-size:12px;font-weight:800;
border:2px solid var(–ink);margin-bottom:8px}
.ex-question{font-size:15.5px;font-weight:700;margin-bottom:12px;line-height:1.4}
.ex-question em{background:var(–accent-2);padding:0 4px;border-radius:4px;font-style:normal;font-weight:800}

.options{display:flex;flex-direction:column;gap:8px}
.option{
background:#FAFAFA;
border:2px solid var(–ink);
border-radius:var(–radius-sm);
padding:12px 14px;
font-family:inherit;font-size:14.5px;font-weight:600;color:inherit;
text-align:left;cursor:pointer;
transition:all .15s ease;
display:flex;align-items:center;gap:10px;
}
.option:active{transform:scale(.98)}
.option.selected{background:var(–blue);color:white}
.option.correct{background:var(–good);color:white;animation:pop .3s ease}
.option.wrong{background:var(–bad);color:white;animation:shake .4s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.option.disabled{pointer-events:none;opacity:.7}

.feedback{
margin-top:10px;padding:10px 12px;border-radius:var(–radius-sm);
font-size:13.5px;font-weight:700;display:none;
border:2px solid var(–ink);
}
.feedback.show{display:block;animation:fadeIn .25s}
.feedback.ok{background:#D7F5E5;color:#1b5e3f}
.feedback.no{background:#FFD9D4;color:#7a1f15}

.input-field{
width:100%;padding:12px 14px;
border:2px solid var(–ink);border-radius:var(–radius-sm);
font-family:inherit;font-size:15px;font-weight:600;
background:#FAFAFA;
}
.input-field:focus{outline:none;background:white;box-shadow:3px 3px 0 var(–accent)}
.check-btn{
margin-top:10px;width:100%;
background:var(–accent);color:white;
border:2px solid var(–ink);border-radius:var(–radius-sm);
padding:12px;font-family:inherit;font-weight:800;font-size:15px;
cursor:pointer;box-shadow:var(–shadow-sm);
}
.check-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(–ink)}

/* Final de tema */
.finish-card{
background:var(–good);color:white;
border:3px solid var(–ink);border-radius:var(–radius);
padding:20px;text-align:center;margin-top:14px;
box-shadow:var(–shadow);
display:none;
}
.finish-card.show{display:block;animation:fadeIn .3s}
.finish-card h3{font-size:22px;margin-bottom:6px}
.finish-card p{font-weight:700;margin-bottom:12px}
.finish-card button{
background:white;color:var(–ink);
border:2px solid var(–ink);border-radius:var(–radius-sm);
padding:10px 18px;font-family:inherit;font-weight:800;font-size:14px;
cursor:pointer;margin:4px;
}

/* ====== QUIZ FINAL ====== */
.quiz-intro{
background:var(–purple);color:white;
border:3px solid var(–ink);border-radius:var(–radius);
padding:20px;margin-bottom:14px;box-shadow:var(–shadow);
}
.quiz-intro h2{font-size:26px;margin-bottom:8px}
.quiz-intro ul{padding-left:20px;margin-top:8px;font-weight:600;font-size:14px}
.quiz-intro li{margin-bottom:4px}
.quiz-intro button{
margin-top:14px;width:100%;
background:var(–accent-2);color:var(–ink);
border:2px solid var(–ink);border-radius:var(–radius-sm);
padding:12px;font-family:inherit;font-weight:800;font-size:16px;cursor:pointer;
box-shadow:2px 2px 0 var(–ink);
}

/* Resultado del quiz */
.results{
background:var(–card);border:3px solid var(–ink);
border-radius:var(–radius);padding:20px;
box-shadow:var(–shadow);margin-bottom:14px;
}
.score-big{
font-family:‘Fraunces’,serif;
font-size:70px;font-weight:800;text-align:center;
line-height:1;margin:12px 0;
}
.score-label{text-align:center;font-weight:800;font-size:18px;margin-bottom:14px}
.grade-bar{background:#eee;height:22px;border-radius:999px;border:2px solid var(–ink);overflow:hidden;margin:10px 0}
.grade-bar .fill{height:100%;transition:width .8s ease}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat{background:#FAFAFA;border:2px solid var(–ink);border-radius:var(–radius-sm);padding:10px;text-align:center}
.stat b{display:block;font-size:22px;font-family:‘Fraunces’,serif}
.stat small{font-size:11px;font-weight:700}

.review-item{
background:var(–card);border:3px solid var(–ink);
border-radius:var(–radius);padding:14px;margin-bottom:10px;
box-shadow:var(–shadow-sm);
}
.review-item.wrong{border-left:10px solid var(–bad)}
.review-item.ok{border-left:10px solid var(–good)}
.review-item .q{font-weight:700;font-size:14.5px;margin-bottom:6px}
.review-item .ans{font-size:13.5px;margin-top:4px}
.review-item .ans.yours{color:var(–bad);font-weight:700}
.review-item .ans.good{color:var(–good);font-weight:700}
.review-item .tip{background:#FFF4D6;border:2px dashed var(–ink);padding:8px;border-radius:var(–radius-sm);margin-top:8px;font-size:13px;font-weight:600}

.mascot{font-size:48px;text-align:center;margin:10px 0}

/* utilidades */
.row-btns{display:flex;gap:8px;margin-top:12px}
.row-btns button{flex:1}
.ghost{
background:white;color:var(–ink);
border:2px solid var(–ink);border-radius:var(–radius-sm);
padding:10px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;
}
</style>

</head>
<body>

<div class="topbar">
  <span class="emoji">📚</span>
  <div>
    <div class="title">Español 4° — Práctica</div>
    <div style="font-size:11px;opacity:.8">Examen: Viernes 24 abril</div>
  </div>
  <div class="score" id="starScore">⭐ 0</div>
</div>

<!-- ============ MENÚ PRINCIPAL ============ -->

<section id="home" class="view active">
  <div class="hero">
    <h1>¡Hola! 👋</h1>
    <p>Soy tu compañero de estudio. Vamos a repasar <strong>TODO</strong> lo del examen de mañana, paso a pasito. ¿Listo?</p>
    <span class="pill">6 temas + quiz final</span>
  </div>

  <div class="menu" id="menu">
    <button class="tile t1" data-topic="0">
      <span class="icon">📖</span>
      <h3>Textos</h3>
      <small>Narrativos, expositivos, descriptivos</small>
    </button>
    <button class="tile t2" data-topic="1">
      <span class="icon">🔄</span>
      <h3>Sinónimos y Antónimos</h3>
      <small>Palabras parecidas y opuestas</small>
    </button>
    <button class="tile t3" data-topic="2">
      <span class="icon">🏷️</span>
      <h3>Sustantivos</h3>
      <small>Propios, comunes, colectivos…</small>
    </button>
    <button class="tile t4" data-topic="3">
      <span class="icon">👫</span>
      <h3>Género y Número</h3>
      <small>Masc/Fem · Sing/Plural</small>
    </button>
    <button class="tile t5" data-topic="4">
      <span class="icon">🔗</span>
      <h3>Artículos</h3>
      <small>el, la, un, al, del…</small>
    </button>
    <button class="tile t6" data-topic="5">
      <span class="icon">🌈</span>
      <h3>Adjetivos</h3>
      <small>Cualidades del sustantivo</small>
    </button>
    <button class="quiz-btn" id="startQuiz">
      🏆 QUIZ FINAL
      <span class="sub">Examen de práctica con nota</span>
    </button>
  </div>
</section>

<!-- ============ VISTA DE TEMA ============ -->

<section id="topicView" class="view">
  <button class="back" onclick="goHome()">← Volver al menú</button>
  <div class="topic-head">
    <h2 id="topicTitle"></h2>
    <p id="topicDesc"></p>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="theoryBox"></div>
  <div id="exerciseList"></div>
  <div class="finish-card" id="finishCard">
    <h3>¡Excelente trabajo! 🎉</h3>
    <p id="finishText"></p>
    <button onclick="goHome()">Volver al menú</button>
    <button onclick="nextTopic()">Siguiente tema →</button>
  </div>
</section>

<!-- ============ QUIZ FINAL ============ -->

<section id="quizView" class="view">
  <button class="back" onclick="goHome()">← Volver al menú</button>
  <div id="quizContent"></div>
</section>

<!-- ============ RESULTADOS ============ -->

<section id="resultsView" class="view">
  <button class="back" onclick="goHome()">← Volver al menú</button>
  <div id="resultsContent"></div>
</section>

<script>
/* ===========================================================
   CONTENIDO COMPLETO — Práctica de Español 4° Grado
   Temario: textos, sinónimos/antónimos, sustantivos,
   género/número, artículos, adjetivos
   =========================================================== */

const topics = [
  /* ---------- TEMA 1: TIPOS DE TEXTOS ---------- */
  {
    title:"Tipos de Textos 📖",
    desc:"Narrativos, expositivos y descriptivos. Estructura y elementos.",
    icon:"📖",
    theory:`
      <div class="theory">
        <h3>📝 Los tres tipos de textos</h3>
        <p><strong>Narrativo:</strong> cuenta una historia con personajes, tiempo y espacio. Tiene <strong>introducción, desarrollo (nudo) y desenlace</strong>.</p>
        <p><strong>Expositivo:</strong> explica o informa sobre un tema (noticias, artículos).</p>
        <p><strong>Descriptivo:</strong> dice cómo son las cosas, personas o lugares (usa muchos adjetivos).</p>
        <div class="example">✨ Ejemplo narrativo: "Había una vez un zorro que vivía en el bosque…"<br>
        ✨ Ejemplo expositivo: "El agua se compone de hidrógeno y oxígeno."<br>
        ✨ Ejemplo descriptivo: "La casa era grande, blanca y tenía un jardín florido."</div>
      </div>
      <div class="theory" style="background:#E8F4FF">
        <h3>🎬 Partes de un texto narrativo</h3>
        <ul>
          <li><strong>Introducción:</strong> presenta personajes y lugar.</li>
          <li><strong>Desarrollo / nudo:</strong> ocurre el problema o conflicto.</li>
          <li><strong>Desenlace:</strong> se resuelve la historia (final).</li>
        </ul>
        <p style="margin-top:6px"><strong>Elementos:</strong> personajes, tiempo y espacio.</p>
      </div>
    `,
    exercises:[
      {q:"¿Qué tipo de texto cuenta una historia con personajes?",opts:["Expositivo","Narrativo","Descriptivo"],a:1,tip:"El texto narrativo narra historias con personajes, tiempo y espacio."},
      {q:"¿Qué tipo de texto explica o informa un tema?",opts:["Narrativo","Descriptivo","Expositivo"],a:2,tip:"El expositivo da información (noticias, artículos, reportes)."},
      {q:"'La mariposa era azul, pequeña y muy veloz.' Este texto es…",opts:["Descriptivo","Narrativo","Expositivo"],a:0,tip:"Describe cómo es la mariposa usando adjetivos."},
      {q:"¿Cuál es la parte del texto narrativo donde ocurre el problema?",opts:["Introducción","Desarrollo / nudo","Desenlace"],a:1,tip:"En el desarrollo o nudo aparece el conflicto."},
      {q:"¿En qué parte se presentan los personajes y el lugar?",opts:["Introducción","Desarrollo","Desenlace"],a:0,tip:"La introducción presenta a los personajes y el lugar."},
      {q:"¿Cómo se llama el final de la historia?",opts:["Inicio","Nudo","Desenlace"],a:2,tip:"El desenlace es el final donde se resuelve el problema."},
      {q:"Los personajes, el tiempo y el espacio son elementos de un texto…",opts:["Expositivo","Descriptivo","Narrativo"],a:2,tip:"Los textos narrativos tienen personajes, tiempo y espacio."},
      {q:"'El volcán Poás está en Costa Rica y mide 2.708 metros.' Este texto es…",opts:["Narrativo","Expositivo","Descriptivo"],a:1,tip:"Está informando datos: es expositivo."},
      {q:"Una noticia del periódico es un texto…",opts:["Narrativo","Descriptivo","Expositivo"],a:2,tip:"Las noticias informan hechos: son expositivas."},
      {q:"Un cuento de hadas es un texto…",opts:["Descriptivo","Narrativo","Expositivo"],a:1,tip:"Los cuentos narran historias: son narrativos."},
      {q:"'El señor era alto, con barba blanca y ojos azules.' Este texto es…",opts:["Descriptivo","Narrativo","Expositivo"],a:0,tip:"Describe a una persona: descriptivo."},
      {q:"¿Cuál de estas NO es una parte del texto narrativo?",opts:["Introducción","Resumen","Desenlace"],a:1,tip:"Las tres partes son: introducción, desarrollo y desenlace."},
      {q:"En '…y vivieron felices para siempre', estamos en la parte de…",opts:["Introducción","Nudo","Desenlace"],a:2,tip:"Es el final: desenlace."},
      {q:"El 'tiempo' en un texto narrativo se refiere a…",opts:["Cuándo ocurre la historia","El clima","La duración del libro"],a:0,tip:"El tiempo indica cuándo sucede (ayer, hace mucho, etc.)."},
      {q:"El 'espacio' en un texto narrativo es…",opts:["El tamaño del libro","El lugar donde ocurre","El personaje principal"],a:1,tip:"El espacio es el lugar donde pasa la historia."},
    ]
  },

  /* ---------- TEMA 2: SINÓNIMOS Y ANTÓNIMOS ---------- */
  {
    title:"Sinónimos y Antónimos 🔄",
    desc:"Palabras con significado parecido y opuesto.",
    icon:"🔄",
    theory:`
      <div class="theory">
        <h3>🧠 ¿Qué son?</h3>
        <p><strong>Sinónimos:</strong> palabras que significan lo mismo o casi lo mismo.</p>
        <p><strong>Antónimos:</strong> palabras con significado opuesto.</p>
        <div class="example">✨ Sinónimos: bonito = lindo · contento = feliz · rápido = veloz<br>
        ✨ Antónimos: alto ↔ bajo · día ↔ noche · frío ↔ caliente</div>
      </div>
    `,
    exercises:[
      {q:"¿Cuál es sinónimo de 'feliz'?",opts:["Triste","Alegre","Enojado"],a:1,tip:"Feliz = alegre (significan lo mismo)."},
      {q:"¿Cuál es antónimo de 'grande'?",opts:["Enorme","Pequeño","Alto"],a:1,tip:"Grande ↔ pequeño (son opuestos)."},
      {q:"Sinónimo de 'bonito':",opts:["Feo","Lindo","Sucio"],a:1,tip:"Bonito = lindo."},
      {q:"Antónimo de 'frío':",opts:["Helado","Caliente","Fresco"],a:1,tip:"Frío ↔ caliente."},
      {q:"Sinónimo de 'rápido':",opts:["Lento","Veloz","Despacio"],a:1,tip:"Rápido = veloz."},
      {q:"Antónimo de 'alto':",opts:["Elevado","Bajo","Grande"],a:1,tip:"Alto ↔ bajo."},
      {q:"Sinónimo de 'contento':",opts:["Triste","Aburrido","Feliz"],a:2,tip:"Contento = feliz."},
      {q:"Antónimo de 'día':",opts:["Tarde","Noche","Mañana"],a:1,tip:"Día ↔ noche."},
      {q:"Sinónimo de 'inteligente':",opts:["Tonto","Listo","Flojo"],a:1,tip:"Inteligente = listo."},
      {q:"Antónimo de 'abrir':",opts:["Empujar","Cerrar","Halar"],a:1,tip:"Abrir ↔ cerrar."},

   =========================================================== */
let stars = 0;
let currentTopic = 0;
let topicProgress = new Array(topics.length).fill(0); // 0-100
let topicDone = new Array(topics.length).fill(false);
let quizAnswers = []; // {idx, selected, correct}

const $ = id => document.getElementById(id);

function setScore(){ $('starScore').textContent = '⭐ ' + stars; }
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goHome(){
  showView('home');
  // Actualizar tiles con progreso
  document.querySelectorAll('.tile').forEach((t,i)=>{
    if(topicDone[i]) t.classList.add('done');
  });
}
function nextTopic(){
  if(currentTopic < topics.length-1){
    openTopic(currentTopic+1);
  } else {
    goHome();
  }
}

/* Abrir un tema */
function openTopic(idx){
  currentTopic = idx;
  const t = topics[idx];
  $('topicTitle').textContent = t.title;
  $('topicDesc').textContent = t.desc;
  $('theoryBox').innerHTML = t.theory;
  $('progressFill').style.width = '0%';
  $('finishCard').classList.remove('show');

  const list = $('exerciseList');
  list.innerHTML = '';
  t.exercises.forEach((ex, i)=>{
    const card = document.createElement('div');
    card.className = 'exercise';
    card.innerHTML = `
      <span class="ex-num">Ejercicio ${i+1} de ${t.exercises.length}</span>
      <div class="ex-question">${ex.q}</div>
      <div class="options" data-idx="${i}">
        ${ex.opts.map((o,j)=>`<button class="option" data-j="${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    list.appendChild(card);
    card.querySelectorAll('.option').forEach(btn=>{
      btn.addEventListener('click', ()=>handleAnswer(i, parseInt(btn.dataset.j), btn, ex));
    });
  });

  showView('topicView');
}

function handleAnswer(i, j, btn, ex){
  const opts = btn.parentElement.querySelectorAll('.option');
  if([...opts].some(o=>o.classList.contains('disabled'))) return;
  const fb = $('fb-'+i);
  if(j === ex.a){
    btn.classList.add('correct');
    fb.className = 'feedback show ok';
    fb.innerHTML = '✅ ¡Correcto! ' + ex.tip;
    stars += 1;
  } else {
    btn.classList.add('wrong');
    opts[ex.a].classList.add('correct');
    fb.className = 'feedback show no';
    fb.innerHTML = '❌ La respuesta correcta es <strong>' + String.fromCharCode(65+ex.a) + '. ' + ex.opts[ex.a] + '</strong>. ' + ex.tip;
  }
  opts.forEach(o=>o.classList.add('disabled'));
  setScore();

  // Progreso
  const answered = document.querySelectorAll('#exerciseList .feedback.show').length;
  const total = topics[currentTopic].exercises.length;
  const pct = Math.round(answered/total*100);
  topicProgress[currentTopic] = pct;
  $('progressFill').style.width = pct + '%';

  if(answered === total){
    topicDone[currentTopic] = true;
    const correct = document.querySelectorAll('#exerciseList .feedback.ok').length;
    $('finishText').textContent = `Respondiste ${correct} de ${total} correctamente. ¡Sigue así!`;
    $('finishCard').classList.add('show');
  }
}

    </div>
  `;

function renderQuiz(){
  const c = $('quizContent');
  c.innerHTML = `
    <div class="topic-head">
      <h2>🏆 Quiz Final</h2>
      <p>Responde todas las preguntas y presiona "Calificar" al final.</p>
    </div>
    <div id="quizList"></div>
    <button class="check-btn" id="gradeBtn" style="margin-top:10px">📊 CALIFICAR QUIZ</button>
  `;
  const list = $('quizList');
  quizQuestions.forEach((q, i)=>{
    const card = document.createElement('div');
    card.className = 'exercise';
    card.innerHTML = `
      <span class="ex-num">${i+1} / ${quizQuestions.length} · ${q.topic}</span>
      <div class="ex-question">${q.q}</div>
      <div class="options" data-qi="${i}">
        ${q.opts.map((o,j)=>`<button class="option" data-j="${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
    `;
    list.appendChild(card);
    card.querySelectorAll('.option').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        card.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
        btn.classList.add('selected');
        quizAnswers[i] = parseInt(btn.dataset.j);
      });
    });
  });
  $('gradeBtn').addEventListener('click', gradeQuiz);
}

function gradeQuiz(){
  // Validar que estén todas
  const unanswered = quizQuestions.filter((_,i)=>quizAnswers[i]===undefined).length;
  if(unanswered>0){
    if(!confirm(`Te faltan ${unanswered} preguntas sin responder. ¿Calificar de todos modos?`)) return;
  }
  let correct = 0;
  const details = quizQuestions.map((q,i)=>{
    const sel = quizAnswers[i];
    const ok = sel === q.a;
    if(ok) correct++;
    return {q,i,sel,ok};
  });
  const total = quizQuestions.length;
  const pct = Math.round(correct/total*100);
  const grade10 = (correct/total*100/10).toFixed(1);

  let emoji, msg, color;
  if(pct >= 90){emoji='🏆'; msg='¡EXCELENTE! Dominas el tema.'; color='var(--good)';}
  else if(pct >= 80){emoji='🌟'; msg='¡Muy bien! Estás listo.'; color='var(--good)';}
  else if(pct >= 70){emoji='👍'; msg='Bien, pero repasa los errores.'; color='var(--blue)';}
  else if(pct >= 60){emoji='📚'; msg='Necesitas repasar un poco más.'; color='var(--accent-2)';}
  else {emoji='💪'; msg='¡Ánimo! Vuelve a la práctica y estudia.'; color='var(--bad)';}

  const wrong = details.filter(d=>!d.ok);
  const right = details.filter(d=>d.ok);

  const rc = $('resultsContent');
  rc.innerHTML = `
    <div class="results">
      <div class="mascot">${emoji}</div>
      <div class="score-big" style="color:${color}">${grade10} / 10</div>
      <div class="score-label">${msg}</div>
      <div class="grade-bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="stats">
        <div class="stat"><b style="color:var(--good)">${correct}</b><small>CORRECTAS</small></div>
        <div class="stat"><b style="color:var(--bad)">${total-correct}</b><small>INCORRECTAS</small></div>
        <div class="stat"><b>${pct}%</b><small>ACIERTO</small></div>
        <div class="stat"><b>${total}</b><small>PREGUNTAS</small></div>
      </div>
      <div class="row-btns">
        <button class="ghost" onclick="startQuiz()">🔁 Repetir quiz</button>
        <button class="ghost" onclick="goHome()">🏠 Menú</button>
      </div>
    </div>

    ${wrong.length ? `
      <div class="topic-head" style="background:#FFE8E4">
        <h2>📝 Repaso de errores</h2>
        <p>Revisemos las que fallaste para aprender de ellas:</p>
      </div>
      ${wrong.map(d=>`
        <div class="review-item wrong">
          <div class="q">${d.i+1}. [${d.q.topic}] ${d.q.q}</div>
          <div class="ans yours">Tu respuesta: ${d.sel!==undefined ? String.fromCharCode(65+d.sel)+'. '+d.q.opts[d.sel] : '(sin responder)'}</div>
          <div class="ans good">Correcta: ${String.fromCharCode(65+d.q.a)}. ${d.q.opts[d.q.a]}</div>
          <div class="tip">💡 ${d.q.tip}</div>
        </div>
      `).join('')}
    ` : `
      <div class="topic-head" style="background:#D7F5E5">
        <h2>🎉 ¡Sin errores!</h2>
        <p>Respondiste todas las preguntas correctamente. ¡Estás listísimo para el examen!</p>
      </div>
    `}

    ${right.length && wrong.length ? `
      <details style="margin-top:14px">
        <summary style="cursor:pointer;font-weight:800;padding:10px;background:#D7F5E5;border:2px solid var(--ink);border-radius:var(--radius-sm)">
          ✅ Ver las ${right.length} que acertaste
        </summary>
        <div style="margin-top:10px">
        ${right.map(d=>`
          <div class="review-item ok">
            <div class="q">${d.i+1}. [${d.q.topic}] ${d.q.q}</div>
            <div class="ans good">Respuesta: ${String.fromCharCode(65+d.q.a)}. ${d.q.opts[d.q.a]}</div>
          </div>
        `).join('')}
        </div>
      </details>
    ` : ''}
  `;
  showView('resultsView');
}

setScore();
</script>

</body>
</html>
